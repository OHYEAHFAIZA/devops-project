name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t devops-app .

      - name: Run Docker container
        run: docker run -d -p 5000:5000 devops-app

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd devops-project || git clone https://github.com/OHYEAHFAIZA/devops-project.git
            cd devops-project
            git pull
            docker stop $(docker ps -q) || true
            docker rm $(docker ps -aq) || true
            docker build -t devops-app .
            docker run -d -p 80:5000 devops-app